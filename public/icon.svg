<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Sfondo pieno (icona mascherata: il contenuto sta nella zona sicura centrale) -->
  <rect width="512" height="512" fill="#111111"/>

  <!-- Frigo aperto: corpo cream, interno "vuoto" (= sfondo) con ripiani e prodotti -->
  <rect x="158" y="106" width="196" height="300" rx="40" fill="#F7F6F1"/>
  <rect x="182" y="130" width="148" height="252" rx="22" fill="#111111"/>

  <!-- Ripiani -->
  <rect x="182" y="212" width="148" height="9" fill="#F7F6F1"/>
  <rect x="182" y="298" width="148" height="9" fill="#F7F6F1"/>

  <!-- Ripiano alto: pomodoro (dettaglio rosso) + bottiglia -->
  <circle cx="215" cy="178" r="27" fill="#d6442f"/>
  <rect x="268" y="144" width="30" height="64" rx="10" fill="#F7F6F1"/>

  <!-- Ripiano centrale: barattolo + sfera -->
  <rect x="196" y="232" width="42" height="60" rx="10" fill="#F7F6F1"/>
  <circle cx="288" cy="262" r="29" fill="#F7F6F1"/>

  <!-- Ripiano basso: scatola + lattina -->
  <rect x="200" y="318" width="52" height="56" rx="10" fill="#F7F6F1"/>
  <rect x="270" y="314" width="40" height="60" rx="10" fill="#F7F6F1"/>
</svg>
