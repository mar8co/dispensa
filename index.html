    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f1e9" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121211" />
    <script>
      // Applica il tema forzato (se scelto nel profilo) prima del paint,
      // per evitare il lampo di colore sbagliato all'avvio.
      try {
        var t = localStorage.getItem("dispensa-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) { /* niente */ }
    </script>
