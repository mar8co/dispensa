# Build iOS su runner macOS in cloud (l'utente sviluppa su Windows e non ha un
# Mac). Per i repository PUBBLICI i runner macOS di GitHub Actions sono
# gratuiti, quindi questa è la via di compilazione/firma/upload verso TestFlight.
#
# Due modalità:
#  - `build-unsigned` (automatica su push): compila SENZA firma, solo per
#    accorgersi subito se il progetto iOS si rompe. Non serve alcun segreto.
#  - `testflight` (manuale, workflow_dispatch con upload=true): archivia,
#    firma e carica su TestFlight. Richiede i segreti elencati sotto.
#
# Segreti richiesti SOLO per l'upload (da creare in Settings → Secrets):
#   APP_STORE_CONNECT_KEY_ID      id della App Store Connect API key
#   APP_STORE_CONNECT_ISSUER_ID   issuer id della stessa key
#   APP_STORE_CONNECT_KEY_P8      contenuto del file .p8 (chiave privata)
#   BUILD_CERTIFICATE_BASE64      certificato di distribuzione .p12 in base64
#   P12_PASSWORD                  password del .p12
#   PROVISIONING_PROFILE_BASE64   profilo di provisioning .mobileprovision in base64
#   KEYCHAIN_PASSWORD             una password qualsiasi per il keychain temporaneo
# Variabili client per la build web (Settings → Secrets):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_VAPID_PUBLIC_KEY

name: iOS

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "ios/**"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios.yml"
  workflow_dispatch:
    inputs:
      upload:
        description: "Carica su TestFlight (richiede i segreti di firma)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build web
        # VITE_API_BASE è ciò che fa funzionare i proxy /api/* dentro il guscio
        # nativo: la webview è servita da capacitor://localhost, quindi i fetch
        # relativi non troverebbero Vercel. Vedi src/lib/api.js.
        env:
          VITE_API_BASE: https://la-dispensa-omega.vercel.app
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: npm run build

      # Diagnostica: i log di Actions non sono leggibili senza login, mentre le
      # ANNOTAZIONI (::error::) compaiono anche pubblicamente sulla pagina del
      # run. Copy e update sono separati per capire subito quale dei due rompe.
      - name: Ambiente iOS
        run: |
          echo "xcode: $(xcodebuild -version | tr '\n' ' ')"
          echo "pod:   $(pod --version 2>/dev/null || echo 'non installato')"
          echo "cap:   $(npx cap --version)"
          echo "--- ios/ dal checkout ---"
          find ios -maxdepth 3 -not -path '*/public/*' | sort
          echo "--- Podfile presente? ---"
          ls ios/App/Podfile 2>/dev/null || echo "nessun Podfile (progetto SPM)"

      - name: Copia gli asset web (cap copy)
        run: |
          set -o pipefail
          npx cap copy ios 2>&1 | tee /tmp/capcopy.log || {
            tail -20 /tmp/capcopy.log | while IFS= read -r l; do echo "::error::cap copy: $l"; done
            exit 1
          }

      - name: Aggiorna i plugin nativi (cap update)
        run: |
          set -o pipefail
          npx cap update ios 2>&1 | tee /tmp/capupdate.log || {
            tail -20 /tmp/capupdate.log | while IFS= read -r l; do echo "::error::cap update: $l"; done
            exit 1
          }

      # ---------- Compilazione di verifica (senza firma) ----------
      - name: Compila senza firma
        if: ${{ github.event_name == 'push' || !inputs.upload }}
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcodebuild.log || {
              grep -E "error:|Error Domain|xcodebuild:" /tmp/xcodebuild.log | tail -15 \
                | while IFS= read -r l; do echo "::error::xcodebuild: $l"; done
              exit 1
            }

      # ---------- Archivio firmato + upload su TestFlight ----------
      - name: Prepara portachiavi e profilo
        if: ${{ inputs.upload }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archivia ed esporta
        if: ${{ inputs.upload }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive

          cat > $RUNNER_TEMP/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Carica su TestFlight
        if: ${{ inputs.upload }}
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$KEY_P8" > ~/private_keys/AuthKey_$KEY_ID.p8
          xcrun altool --upload-app -f $RUNNER_TEMP/export/*.ipa -t ios \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"
